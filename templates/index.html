<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>NAVER</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, "Noto Sans KR", sans-serif;
}



body{

    background:white;

}



/* 상단 */

.top{

    width:1200px;

    margin:auto;

    display:flex;

    justify-content:flex-end;

    gap:20px;

    padding:20px 0;

    font-size:13px;

    color:#555;

}



/* 로고 */

.logo{

    margin-top:120px;

    text-align:center;

    font-size:80px;

    font-weight:900;

    color:#03c75a;

    letter-spacing:-8px;

}



/* 검색창 */

.search{


    width:700px;

    height:65px;


    margin:40px auto;


    border:2px solid #03c75a;


    border-radius:35px;


    display:flex;


    align-items:center;


    padding:0 25px;


}



.search input{


    border:none;

    outline:none;

    width:100%;

    font-size:20px;


}



.icon{

    font-size:25px;

    color:#03c75a;

}



/* 메뉴 */

.menu{


    width:800px;


    margin:30px auto;


    display:flex;


    justify-content:space-between;


}



.menu div{


    text-align:center;


    font-size:15px;


}



.circle{


    width:55px;

    height:55px;

    border-radius:50%;


    background:#f1f1f1;


    display:flex;

    align-items:center;

    justify-content:center;


    margin:auto;


    margin-bottom:10px;


    font-size:25px;


}



/* 메인 영역 */

.main{


    width:1200px;


    margin:60px auto;


    display:grid;


    grid-template-columns: 2fr 1fr;


    gap:30px;


}



.box{


    border:1px solid #ddd;


    border-radius:12px;


    padding:25px;


}



.title{


    font-size:22px;

    font-weight:bold;

    margin-bottom:20px;


}



/* 뉴스 */

.news{


    display:flex;

    flex-direction:column;

    gap:15px;


}



.news p{


    background:#f8f8f8;


    padding:15px;


    border-radius:8px;


}



/* 로그인 */


.login button{


    width:100%;


    margin-top:20px;


    padding:15px;


    border:none;


    background:#03c75a;


    color:white;


    border-radius:8px;


    font-size:16px;


}



/* 하단 */


footer{


    margin-top:100px;


    background:#fafafa;


    text-align:center;


    padding:40px;


    color:#777;


}


</style>


</head>
