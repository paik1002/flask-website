<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>NAVER 스타일 메인</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, "Noto Sans KR", sans-serif;
}


body{

    background:white;

    color:#222;

}


/* 상단 메뉴 */

header{

    width:100%;

    border-bottom:1px solid #eee;

}


.top-menu{

    width:1200px;

    margin:auto;

    display:flex;

    justify-content:flex-end;

    gap:20px;

    padding:15px 0;

    font-size:13px;

    color:#555;

}



/* 로고 영역 */

.logo-area{


    width:1200px;

    margin:60px auto 30px;

    text-align:center;


}



.logo{


    font-size:70px;

    font-weight:bold;

    color:#03c75a;

    letter-spacing:-5px;


}



/* 검색창 */


.search-box{


    width:700px;

    height:60px;

    border:2px solid #03c75a;

    border-radius:30px;

    margin:auto;

    display:flex;

    align-items:center;

    padding:0 25px;


}



.search-box input{


    width:100%;

    border:none;

    outline:none;

    font-size:20px;


}



.search-btn{


    font-size:25px;

    color:#03c75a;

}



/* 컨텐츠 */


.container{


    width:1200px;

    margin:60px auto;


    display:grid;

    grid-template-columns: 2fr 1fr;

    gap:30px;


}



.card{


    border:1px solid #ddd;

    border-radius:15px;

    padding:25px;


}



.card h2{


    font-size:22px;

    margin-bottom:20px;


}




.news{


    display:flex;

    flex-direction:column;

    gap:15px;


}



.news-item{


    padding:15px;

    background:#f8f8f8;

    border-radius:10px;


}



/* 오른쪽 로그인 */


.login{


    text-align:center;


}



.login button{


    width:100%;

    padding:15px;

    margin-top:20px;

    border:none;

    border-radius:8px;

    background:#03c75a;

    color:white;

    font-size:17px;


}



/* 하단 */

footer{


    margin-top:100px;

    background:#fafafa;

    padding:40px;

    text-align:center;

    color:#777;


}



</style>


</head>



<body>



<header>


<div class="top-menu">


<span>메일</span>

<span>카페</span>

<span>블로그</span>

<span>쇼핑</span>

<span>로그인</span>


</div>


</header>





<section class="logo-area">


<div class="logo">

NAVER

</div>


<div class="search-box">


<input type="text" placeholder="검색어를 입력하세요">


<div class="search-btn">

🔍

</div>


</div>



</section>






<section class="container">



<div class="card">


<h2>

뉴스

</h2>



<div class="news">


<div class="news-item">

오늘의 주요 뉴스입니다.

</div>


<div class="news-item">

새로운 기술과 서비스 소식

</div>


<div class="news-item">

세계 최신 트렌드 업데이트

</div>


</div>



</div>





<div class="card login">


<h2>

로그인

</h2>



<p>

네이버 스타일 메인페이지

</p>



<button>

로그인

</button>


</div>



</section>






<section class="container">


<div class="card">


<h2>

인기 검색어

</h2>


<p>

🔥 AI

</p>

<p>

🔥 여행

</p>

<p>

🔥 스포츠

</p>


</div>



<div class="card">


<h2>

서비스

</h2>


<p>

메일</p>

<p>

지도</p>

<p>

쇼핑</p>



</div>


</section>






<footer>


<p>

Flask + Vercel Website

</p>


<p>

Copyright © 2026

</p>


</footer>



</body>


</html>
